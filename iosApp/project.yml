name: iosApp
options:
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16"
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.gasguru.debug
        release:
          PRODUCT_BUNDLE_IDENTIFIER: com.gasguru
