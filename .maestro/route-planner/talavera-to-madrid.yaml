appId: com.gasguru
name: "Plan route Talavera to Madrid"
---
- assertVisible:
    id: "search_bar"
- swipe:
    from:
      id: "map_station_list"
    direction: DOWN
- waitForAnimationToEnd
- tapOn:
    id: "home_create_route_fab"
- waitForAnimationToEnd
- assertVisible:
    id: "route_origin_field"
- tapOn:
    id: "route_origin_field"
- waitForAnimationToEnd
- inputText: "Talavera de la Reina"
- extendedWaitUntil:
    visible:
      text: "Talavera de la Reina, España"
    timeout: 10000
- tapOn: "Talavera de la Reina, España"
- waitForAnimationToEnd
- tapOn:
    id: "route_destination_field"
- waitForAnimationToEnd
- inputText: "Madrid"
- extendedWaitUntil:
    visible:
      text: "Madrid, España"
    timeout: 10000
- tapOn: "Madrid, España"
- waitForAnimationToEnd
- tapOn:
    id: "route_start_button"
- extendedWaitUntil:
    visible:
      id: "route-destination"
    timeout: 15000
- assertVisible:
    id: "route-destination"
- assertVisible:
    id: "route-info"
- tapOn:
    id: "route-close-button"
- waitForAnimationToEnd
- assertNotVisible:
    id: "route-destination"
- assertVisible:
    id: "search_bar"
