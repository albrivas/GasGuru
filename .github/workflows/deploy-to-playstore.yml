name: Deploy to Play Store

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Generate local.properties
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_STYLE_MAP_ID: ${{ secrets.GOOGLE_STYLE_MAP_ID }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ONE_SIGNAL: ${{ secrets.ONE_SIGNAL }}
          MIXPANEL: ${{ secrets.MIXPANEL }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
          SHA1_DEBUG: ${{ secrets.SHA1_DEBUG }}
          SHA1_PLAY_STORE: ${{ secrets.SHA1_PLAY_STORE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
        run: |
          echo "googleApiKey=$GOOGLE_MAPS_API_KEY" >> local.properties
          echo "googleStyleId=$GOOGLE_STYLE_MAP_ID" >> local.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> local.properties
          echo "keyAlias=$KEYSTORE_ALIAS" >> local.properties
          echo "keyPassword=$KEY_PASSWORD" >> local.properties
          echo "onesignalAppId=$ONE_SIGNAL" >> local.properties
          echo "mixpanelProjectToken=$MIXPANEL" >> local.properties
          echo "clarityProjectId=$CLARITY_PROJECT_ID" >> local.properties
          echo "sha1Debug=$SHA1_DEBUG" >> local.properties
          echo "sha1PlayStore=$SHA1_PLAY_STORE" >> local.properties
          echo "supabaseUrl=$SUPABASE_URL" >> local.properties
          echo "supabaseKey=$SUPABASE_API_KEY" >> local.properties

      - name: Create google-services.json
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo $DATA | base64 -di > app/google-services.json

      - name: Read version.properties
        run: |
          while IFS='=' read -r key value || [[ -n "$key" ]]; do
            echo "Processing $key with value $value"
            case "$key" in
            "versionCode"|"versionMajor"|"versionMinor"|"versionPatch")
              echo "$key=$value" >> $GITHUB_ENV
              ;;
            esac
          done < versions.properties

      - name: Bump version
        uses: chkfung/android-version-actions@v1.2.3
        with:
          gradlePath: app/build.gradle.kts
          versionCode: ${{ env.versionCode }}
          versionName: ${{ env.versionMajor }}.${{ env.versionMinor }}.${{ env.versionPatch }}

      - name: Assemble Release Bundle
        run: ./gradlew bundleProdRelease

      - name: Sign Release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/prodRelease
          signingKeyBase64: ${{ secrets.PLAY_STORE_SIGNING_KEY }}
          alias: ${{ secrets.KEYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Deploy to production
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_STORE }}
          packageName: com.gasguru
          releaseFiles: app/build/outputs/bundle/prodRelease/app-prod-release.aab
          track: production
          status: completed
          whatsNewDirectory: distribution/whatsnew

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.versionMajor }}.${{ env.versionMinor }}.${{ env.versionPatch }}
          name: Release v${{ env.versionMajor }}.${{ env.versionMinor }}.${{ env.versionPatch }}
          draft: false
          prerelease: false
          generate_release_notes: true
