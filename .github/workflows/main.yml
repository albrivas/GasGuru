name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'sync/') && !startsWith(github.head_ref, 'docs/')}}
    name: Build
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Cache SonarQube packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Gradle packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Generate local.properties
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_STYLE_MAP_ID: ${{ secrets.GOOGLE_STYLE_MAP_ID }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ONE_SIGNAL: ${{ secrets.ONE_SIGNAL }}
          MIXPANEL: ${{ secrets.MIXPANEL }}
          SHA1_DEBUG: ${{ secrets.SHA1_DEBUG }}
          SHA1_PLAY_STORE: ${{ secrets.SHA1_PLAY_STORE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
        run: |
          echo "googleApiKey=$GOOGLE_MAPS_API_KEY" >> local.properties
          echo "googleStyleId=$GOOGLE_STYLE_MAP_ID" >> local.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> local.properties
          echo "keyAlias=$KEYSTORE_ALIAS" >> local.properties
          echo "keyPassword=$KEY_PASSWORD" >> local.properties
          echo "onesignalAppId=$ONE_SIGNAL" >> local.properties
          echo "mixpanelProjectToken=$MIXPANEL" >> local.properties
          echo "sha1Debug=$SHA1_DEBUG" >> local.properties
          echo "sha1PlayStore=$SHA1_PLAY_STORE" >> local.properties
          echo "supabaseUrl=$SUPABASE_URL" >> local.properties
          echo "supabaseKey=$SUPABASE_API_KEY" >> local.properties

      - name: Create google-services.json
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo $DATA | base64 -di > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./

      - name: Run detekt
        run: ./gradlew codeCheck
        working-directory: ./

      - name: Run unit tests + JaCoCo (prod)
        run: ./gradlew test -x :app:test :app:testProdDebugUnitTest jacocoRootReport
        working-directory: ./

      - name: Analyze with SonarCloud
        if: ${{ github.event_name == 'pull_request' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
        run: |
          ./gradlew sonar --info \
            -Dsonar.gradle.skipCompile=true \
            -Dsonar.pullrequest.key="$PR_NUMBER" \
            -Dsonar.pullrequest.branch="$PR_BRANCH" \
            -Dsonar.pullrequest.base="$PR_BASE"
        working-directory: ./

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          curl --proto "=https" --tlsv1.2 -sSfL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Assemble APK for Maestro
        run: ./gradlew assembleProdRelease
        working-directory: ./

      - name: Start Android Emulator
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: "-no-snapshot-save -no-window -no-boot-anim -no-audio"
          script: |
            ./gradlew connectedCheck
            adb install app/build/outputs/apk/prod/release/app-prod-release.apk
            maestro test .maestro/config.yaml

      - name: Upload Maestro test results and logcat
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-test-results
          path: /home/runner/.maestro/tests/
          retention-days: 7
